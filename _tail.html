<script>
  // ---- Nav border on scroll ----
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    nav.classList.toggle('scrolled', window.scrollY > 12);
  }, { passive: true });

  // ---- Reveal on scroll ----
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('in');
        io.unobserve(e.target);
      }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => io.observe(el));

  // ---- Live Delhi clock (IST = UTC+05:30) ----
  function tickClock() {
    const el = document.getElementById('clock');
    if (!el) return;
    const now = new Date();
    const istMs = now.getTime() + (now.getTimezoneOffset() + 330) * 60000;
    const ist = new Date(istMs);
    const hh = String(ist.getHours()).padStart(2, '0');
    const mm = String(ist.getMinutes()).padStart(2, '0');
    el.textContent = hh + ':' + mm + ' IST';
  }
  tickClock();
  setInterval(tickClock, 30000);

  // ---- Counter animation on card metrics ----
  function animateCount(el) {
    const target = parseFloat(el.dataset.target);
    const suffix = el.dataset.suffix || '';
    if (isNaN(target)) return;
    const isDecimal = target % 1 !== 0;
    const duration = 1400;
    const start = performance.now();
    function step(now) {
      const t = Math.min((now - start) / duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      const val = target * eased;
      el.textContent = (isDecimal ? val.toFixed(2) : Math.round(val)) + suffix;
      if (t < 1) requestAnimationFrame(step);
      else el.textContent = target + suffix;
    }
    requestAnimationFrame(step);
  }
  const counterIO = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        animateCount(e.target);
        counterIO.unobserve(e.target);
      }
    });
  }, { threshold: 0.4 });
  document.querySelectorAll('.metric-num[data-target]').forEach(el => {
    el.textContent = '0' + (el.dataset.suffix || '');
    counterIO.observe(el);
  });

  // ---- Magnetic CTAs ----
  const magnets = document.querySelectorAll('.btn, .see-all');
  magnets.forEach(btn => {
    btn.addEventListener('mousemove', (e) => {
      const r = btn.getBoundingClientRect();
      const x = e.clientX - r.left - r.width / 2;
      const y = e.clientY - r.top - r.height / 2;
      btn.style.transform = 'translate(' + (x * 0.18) + 'px, ' + (y * 0.22) + 'px)';
    });
    btn.addEventListener('mouseleave', () => {
      btn.style.transform = '';
    });
  });

  // ---- Subtle parallax on hero portrait ----
  const portrait = document.querySelector('.portrait');
  if (portrait && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 8;
      const y = (e.clientY / window.innerHeight - 0.5) * 8;
      portrait.style.transform = 'rotate(2deg) translate(' + x + 'px, ' + y + 'px)';
    });
  }

  // ---- Easter egg — type "haider" anywhere for a quick red pulse ----
  let buf = '';
  window.addEventListener('keydown', (e) => {
    buf = (buf + e.key.toLowerCase()).slice(-6);
    if (buf === 'haider') {
      document.body.animate(
        [{ background: 'var(--bg)' }, { background: 'var(--red-soft)' }, { background: 'var(--bg)' }],
        { duration: 700 }
      );
      buf = '';
    }
  });
</script>

</body>
</html>
